<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheduler Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.5rem; font-weight: 600; color: #f8fafc; }

    #server-status { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 0.4rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; transition: background 0.3s; }
    .dot.live { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .instances {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
    }

    .instance {
      background: #161822;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 1.5rem;
    }

    .instance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .instance-name { font-size: 1rem; font-weight: 600; color: #f1f5f9; }

    .instance-badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: #1e2130;
      border: 1px solid #2d3148;
      color: #64748b;
    }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.35rem;
    }

    .card-value { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; font-variant-numeric: tabular-nums; }
    .card-sub   { font-size: 0.75rem; color: #475569; margin-top: 0.2rem; }

    .card.highlight { border-color: #3b82f6; }
    .card.highlight .card-value { color: #60a5fa; }
    .card.success   { border-color: #22c55e; }
    .card.success .card-value   { color: #4ade80; }

    .threads-title {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    .thread-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .thread-label { font-size: 0.75rem; color: #94a3b8; width: 2rem; flex-shrink: 0; }
    .bar-track { flex: 1; background: #2d3148; border-radius: 999px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg,#3b82f6,#60a5fa); transition: width 0.4s ease; }
    .bar-fill.complete { background: linear-gradient(90deg,#16a34a,#4ade80); }
    .week-label { font-size: 0.75rem; color: #475569; width: 2.5rem; text-align: right; flex-shrink: 0; }

    .no-instances { color: #334155; text-align: center; padding: 4rem 0; font-size: 0.9rem; }

    #last-updated { font-size: 0.72rem; color: #334155; text-align: right; margin-top: 1.5rem; }
  </style>
</head>
<body>

<header>
  <h1>Scheduler Dashboard</h1>
  <div id="server-status">
    <span class="dot" id="server-dot"></span>
    <span id="server-label">Connecting to VM...</span>
  </div>
</header>

<div class="instances" id="instances"></div>
<div id="last-updated"></div>

<script>
  const ALL_METRICS_URL = 'http://bromfien.duckdns.org:8080/all-metrics';

  function fmtMs(ms) {
    const s  = Math.floor(Math.max(ms, 0) / 1000);
    const h  = Math.floor(s / 3600).toString().padStart(2, '0');
    const m  = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
    const sc = (s % 60).toString().padStart(2, '0');
    return `${h}:${m}:${sc}`;
  }

  function fmtNum(n) { return Math.round(n).toLocaleString(); }

  function renderInstance(id, data) {
    const label = id === location.hostname ? 'This machine' :
                  id.includes('scheduler-vm') ? 'Cloud VM' : id;

    const threads = data.threadWeeks.map((week, i) => {
      const pct  = Math.min((week / data.totalWeeks) * 100, 100).toFixed(1);
      const done = week >= data.totalWeeks ? ' complete' : '';
      return `<div class="thread-row">
        <span class="thread-label">T${i}</span>
        <div class="bar-track"><div class="bar-fill${done}" style="width:${pct}%"></div></div>
        <span class="week-label">${week}/${data.totalWeeks}</span>
      </div>`;
    }).join('');

    return `
      <div class="instance" id="inst-${CSS.escape(id)}">
        <div class="instance-header">
          <span class="instance-name">${id}</span>
          <span class="instance-badge">${label}</span>
        </div>
        <div class="grid">
          <div class="card highlight">
            <div class="card-label">Solutions</div>
            <div class="card-value">${fmtNum(data.solutions)}</div>
            <div class="card-sub">${data.solPerHr.toFixed(2)} sol/hr</div>
          </div>
          <div class="card">
            <div class="card-label">Running</div>
            <div class="card-value">${fmtMs(data.elapsedMs)}</div>
            <div class="card-sub">last: ${fmtMs(data.sinceLastSolMs)} ago</div>
          </div>
          <div class="card">
            <div class="card-label">Attempts</div>
            <div class="card-value">${fmtNum(data.attempts)}</div>
            <div class="card-sub">${fmtNum(data.attPerMin)} att/min</div>
          </div>
          <div class="card success">
            <div class="card-label">Peak Week</div>
            <div class="card-value">${data.peakWeek}/${data.totalWeeks}</div>
            <div class="card-sub">${data.nThreads} thread${data.nThreads !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="threads-title">Thread Progress</div>
        ${threads}
      </div>`;
  }

  async function refresh() {
    const dot   = document.getElementById('server-dot');
    const label = document.getElementById('server-label');
    const container = document.getElementById('instances');

    try {
      const res  = await fetch(ALL_METRICS_URL, { cache: 'no-store', signal: AbortSignal.timeout(4000) });
      const all  = await res.json();
      const ids  = Object.keys(all);

      dot.className   = 'dot live';
      label.textContent = `VM connected · ${ids.length} instance${ids.length !== 1 ? 's' : ''}`;

      container.innerHTML = ids.length
        ? ids.map(id => renderInstance(id, all[id])).join('')
        : '<div class="no-instances">No instances reporting yet.</div>';

    } catch {
      dot.className   = 'dot';
      label.textContent = 'VM unreachable';
      container.innerHTML = '<div class="no-instances">Could not reach bromfien.duckdns.org:8080</div>';
    }

    document.getElementById('last-updated').textContent =
      `Last updated: ${new Date().toLocaleTimeString()}`;
  }

  refresh();
  setInterval(refresh, 1000);
</script>

</body>
</html>
